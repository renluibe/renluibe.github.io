<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Long (Lewis) Ren 任龙 - Professor, School of Artificial Intelligence and Data Science, University of International Business and Economics." />
  <meta name="theme-color" content="#17233c" />
  <title>Long Ren (任龙) | Academic Homepage</title>
  <style>
    body{margin:0;color:#222831;background:#fff;font-family:Georgia,"Times New Roman","Noto Serif SC",SimSun,serif;font-size:16px;line-height:1.72}
    .loading{max-width:760px;margin:80px auto;padding:0 24px;color:#5f6875}
    .loading h1{color:#17233c;font-size:28px;font-weight:600;margin:0 0 12px}
    .fallback{max-width:860px;margin:52px auto;padding:0 24px}.fallback h1,.fallback h2{color:#17233c}.fallback section{margin-top:28px;border-top:1px solid #d9dde3;padding-top:18px}
  </style>
</head>
<body>
  <div class="loading"><h1>Long Ren 任龙</h1><p>Loading academic homepage...</p></div>
  <script>
    (async function(){
      var source='https://raw.githubusercontent.com/renluibe/renluibe.github.io/8a97e6e0c09dc1fde7265ba52bfdc911581a9c23/index.html';
      var navHtml='<a href="#students"><span class="lang-en">Students</span><span class="lang-zh">指导学生情况</span></a>';
      var sectionHtml='<section id="students"><h2><span class="lang-en">Student Supervision</span><span class="lang-zh">指导学生情况</span></h2><p class="lang-zh">本科生 42人，硕士研究生 32 人，升学去向包括清华大学、香港大学、香港科技大学、香港中文大学、新加坡国立大学、帝国理工学院、多伦多大学等；就业去向包括中金公司、中信证券、易方达基金、博时基金、国家开发银行、中国工商银行、中国银行、招商银行、京东、中国电信等。</p><p class="lang-en">Professor Ren has supervised 42 undergraduate students and 32 master\'s students. Their employment destinations include CICC, CITIC Securities, E Fund, Bosera Funds, China Development Bank, Industrial and Commercial Bank of China, Bank of China, China Merchants Bank, JD.com, China Telecom, and others.</p></section>';
      var serviceZhHtml='<li>担任M&amp;SOM, POM, Decision Sciences, EJOR, IEEE Transactions, Research Policy等期刊审稿人。</li>';
      var serviceEnHtml='<li>Reviewer for journals including M&amp;SOM, POM, Decision Sciences, EJOR, IEEE Transactions, and Research Policy.</li>';
      var externalReviewZhHtml='<li>北京大学工业工程与管理系、北京理工大学管理学院、中央财经大学金融学院、北京交通大学经济管理学院、北京邮电大学经济管理学院、西南财经大学金融学院校外评审专家。</li>';
      function appendReviewerService(doc){
        var zhList=doc.querySelector('section#service ul.service-list.lang-zh');
        if(zhList && zhList.textContent.indexOf('Research Policy')===-1){zhList.insertAdjacentHTML('beforeend',serviceZhHtml);}
        if(zhList && zhList.textContent.indexOf('西南财经大学金融学院校外评审专家')===-1){zhList.insertAdjacentHTML('beforeend',externalReviewZhHtml);}
        var enList=doc.querySelector('section#service ul.service-list.lang-en');
        if(enList && enList.textContent.indexOf('Research Policy')===-1){enList.insertAdjacentHTML('beforeend',serviceEnHtml);}
      }
      function updateWorkingPapers(doc){
        var list=doc.querySelector('section#working-papers ul.working-list');
        if(!list){return;}
        var items=Array.from(list.querySelectorAll('li'));
        var risk=items.find(function(li){return li.textContent.indexOf('A Risk-Averse Newsvendor Pricing Model Under the VaR Criterion')!==-1;});
        var farmers=items.find(function(li){return li.textContent.indexOf('How to Finance the Budget Constrained Farmers? An ESG Perspective')!==-1;});
        if(risk){risk.innerHTML='A Risk-Averse Newsvendor Pricing Model Under the VaR Criterion, under review in <em>Production and Operations Management</em>';}
        if(risk && farmers){list.insertBefore(risk,farmers);}
      }
      function fallback(){
        document.body.innerHTML='<main class="fallback"><h1>Long Ren 任龙</h1><section id="students"><h2>指导学生情况</h2><p>本科生 42人，硕士研究生 32 人，升学去向包括清华大学、香港大学、香港科技大学、香港中文大学、新加坡国立大学、帝国理工学院、多伦多大学等；就业去向包括中金公司、中信证券、易方达基金、博时基金、国家开发银行、中国工商银行、中国银行、招商银行、京东、中国电信等。</p></section><section id="news"><h2>新闻与链接</h2></section></main>';
      }
      try{
        var response=await fetch(source,{cache:'no-store'});
        if(!response.ok){throw new Error('source unavailable');}
        var html=await response.text();
        var doc=new DOMParser().parseFromString(html,'text/html');
        var nav=doc.querySelector('nav.main-nav');
        if(nav && !doc.querySelector('a[href="#students"]')){nav.insertAdjacentHTML('beforeend',navHtml);}
        var news=doc.querySelector('section#news');
        var main=doc.querySelector('main.content');
        var students=doc.querySelector('section#students');
        if(!students){
          var template=doc.createElement('template');
          template.innerHTML=sectionHtml;
          students=template.content.firstElementChild;
        }
        if(news){
          news.insertAdjacentElement('beforebegin',students);
        }else if(main){
          main.appendChild(students);
        }
        appendReviewerService(doc);
        updateWorkingPapers(doc);
        document.open();
        document.write('<!DOCTYPE html>'+doc.documentElement.outerHTML);
        document.close();
      }catch(e){fallback();}
    })();
  </script>
</body>
</html>
